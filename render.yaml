services:
  - type: web
    name: horsebox-kiosk
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      cd horsebox-kiosk
      pip install -r requirements.txt
    startCommand: |
      cd horsebox-kiosk/src/api
      python3 app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MODBUS_IP
        value: 192.168.1.123
      - key: MODBUS_PORT
        value: 502
    healthCheckPath: /
    autoDeploy: true