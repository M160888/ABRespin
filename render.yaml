services:
  - type: web
    name: horsebox-kiosk
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r horsebox-kiosk/requirements.txt
    startCommand: python horsebox-kiosk/src/api/app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MODBUS_IP
        value: 192.168.1.123
      - key: MODBUS_PORT
        value: 502
    healthCheckPath: /
    autoDeploy: true